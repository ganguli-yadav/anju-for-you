<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#ff4b7d;
font-family:sans-serif;
color:white;
text-align:center;
overflow:hidden;
}

.card{
background:rgba(255,255,255,0.2);
padding:40px;
border-radius:20px;
}

h1{
font-size:40px;
}

#text{
font-size:22px;
margin-top:20px;
}
</style>

</head>

<body>

<div class="card">
<h1>🎂 Happy Birthday My Love ❤️</h1>
<p id="text"></p>
<p>From: Ganguly 💖</p>
</div>

<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>

let message = "You are the most special person in my life. Thank you for coming into my life. I love you so much ❤️";
let i = 0;

function typing(){
if(i < message.length){
document.getElementById("text").innerHTML += message.charAt(i);
i++;
setTimeout(typing,50);
}
}

typing();

</script>

</body>
</html>
