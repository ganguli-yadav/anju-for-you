<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday My Love</title>

<style>
body{
margin:0;
font-family:sans-serif;
text-align:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
color:white;
overflow:hidden;
}

h1{
margin-top:40px;
font-size:45px;
}

#message{
font-size:22px;
margin-top:20px;
min-height:50px;
}

img{
width:250px;
border-radius:15px;
margin-top:20px;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:white;
color:#ff4b7d;
cursor:pointer;
margin-top:20px;
}

/* hearts animation */

.heart{
position:absolute;
color:white;
font-size:30px;
animation:fall 5s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px);}
100%{transform:translateY(100vh);}
}
</style>

</head>

<body>

<h1>🎂 Happy Birthday Anju ❤️</h1>

<div id="message"></div>

<img id="photo" src="https://picsum.photos/300" />

<br>

<button onclick="cutCake()">🎂 Cut Cake</button>

<script>

/* typing love letter */

let text="You are the most special person in my life. Thank you for coming into my life. I love you forever ❤️";

let i=0;

function typing(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,50);
}
}

typing();

/* slideshow */

let photos=[
"https://picsum.photos/300?1",
"https://picsum.photos/300?2",
"https://picsum.photos/300?3"
];

let index=0;

setInterval(()=>{
index=(index+1)%photos.length;
document.getElementById("photo").src=photos[index];
},2000);

/* cake cutting */

function cutCake(){
alert("Cake Cut! Happy Birthday My Love ❤️");
}

/* confetti hearts */

function createHeart(){

let heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},5000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
